# Production compose — pulls pre-built images from GHCR.
#
# Prerequisites:
#   - Traefik running as a separate stack with an external network named "traefik_proxy"
#   - ACME/Let's Encrypt configured in Traefik (entrypoints: web, websecure)
#   - NVIDIA Container Toolkit installed on the host for GPU workers
#
# Quick start:
#   1. Set all required env vars in Portainer (see .env.example)
#   2. Deploy this stack — Traefik will automatically provision TLS
#
# To pin a specific release instead of :main, set IMAGE_TAG in your env vars:
#   IMAGE_TAG=1.2.0

version: "3.9"

x-backend-common: &backend-common
  image: ghcr.io/imaustinlittle/recall/backend:${IMAGE_TAG:-main}
  env_file: .env
  restart: unless-stopped
  volumes:
    - media_files:/data/media
  networks:
    - internal
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache / Queue ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Background workers (one per GPU) ──────────────────────────────────────
  worker-0:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=1
        --queues=transcription,default
        --hostname=worker-0@%h
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  worker-1:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=1
        --queues=transcription,default
        --hostname=worker-1@%h
    environment:
      CUDA_VISIBLE_DEVICES: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # ── Frontend ───────────────────────────────────────────────────────────────
  # All traffic enters here. Next.js rewrites /api/*, /media/*, /ws/* to the
  # api container internally — Traefik only needs to know about the frontend.
  frontend:
    image: ghcr.io/imaustinlittle/recall/frontend:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - internal
      - traefik_proxy
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # ── HTTPS router ──────────────────────────────────────────────────────
      - "traefik.http.routers.recall.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.recall.entrypoints=websecure"
      - "traefik.http.routers.recall.tls=true"
      - "traefik.http.routers.recall.tls.certresolver=letsencrypt"
      - "traefik.http.services.recall.loadbalancer.server.port=3000"

      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      - "traefik.http.routers.recall-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.recall-http.entrypoints=web"
      - "traefik.http.routers.recall-http.middlewares=recall-https-redirect"
      - "traefik.http.middlewares.recall-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.recall-https-redirect.redirectscheme.permanent=true"

  # ── Celery monitor (optional, run with --profile monitor) ─────────────────
  flower:
    <<: *backend-common
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"   # bind to 0.0.0.0 — firewall this port externally
    profiles: ["monitor"]

  # ── MinIO (optional S3-compatible storage, run with --profile minio) ───────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles: ["minio"]

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
  media_files:
  minio_data:
