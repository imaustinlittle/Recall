version: "3.9"

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    args:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
  environment:
    DATABASE_URL: ${DATABASE_URL}
    DATABASE_SYNC_URL: ${DATABASE_SYNC_URL}
    REDIS_URL: ${REDIS_URL}
    SECRET_KEY: ${SECRET_KEY}
    ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
    MEDIA_ROOT: ${MEDIA_ROOT:-/data/media}
    STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
    WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
    WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
    WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
    USE_DIARIZATION: ${USE_DIARIZATION:-false}
    HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    CORS_ORIGINS: ${CORS_ORIGINS}
    MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
    ENVIRONMENT: ${ENVIRONMENT:-production}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
  volumes:
    - media_files:/data/media
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped
  networks:
    - internal

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Cache / Queue ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info"

  # ── Background worker ──────────────────────────────────────────────────────
  worker:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=2
        --queues=transcription,default
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      MEDIA_ROOT: ${MEDIA_ROOT:-/data/media}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      USE_DIARIZATION: ${USE_DIARIZATION:-false}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      CUDA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Celery monitor (run with: docker compose --profile dev up flower) ──────
  flower:
    <<: *backend-common
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    profiles: ["dev"]

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - traefik_proxy
      - media-net
    labels:
      - "traefik.enable=true"
      # ── HTTPS router ────────────────────────────────────────────────────
      - "traefik.http.routers.recall.rule=Host(`recall.austlie.com`)"
      - "traefik.http.routers.recall.entrypoints=https"
      - "traefik.http.routers.recall.tls.certresolver=cloudflare"
      - "traefik.http.services.recall.loadbalancer.server.port=3000"
      # ── HTTP → HTTPS redirect ────────────────────────────────────────────
      - "traefik.http.routers.recall-http.rule=Host(`recall.austlie.com`)"
      - "traefik.http.routers.recall-http.entrypoints=http"
      - "traefik.http.routers.recall-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # ── Ollama (local LLM for summarization) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: recall_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── MinIO (optional S3-compatible storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles: ["minio"]
    networks:
      - internal

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true
  media-net:
    external: true

volumes:
  postgres_data:
  redis_data:
  media_files:
  minio_data:
  ollama_data:
