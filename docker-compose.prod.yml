# Production compose — pulls pre-built images from GHCR.
#
# Prerequisites:
#   - Traefik running as a separate stack with an external network named "traefik_proxy"
#   - ACME/Let's Encrypt configured in Traefik (entrypoints: http, https)
#   - NVIDIA Container Toolkit installed on the host for GPU workers
#
# Quick start:
#   1. Set all required env vars in Portainer (see .env.example)
#   2. Deploy this stack — Traefik will automatically provision TLS
#
# To pin a specific release instead of :main, set IMAGE_TAG in your env vars:
#   IMAGE_TAG=1.2.0

version: "3.9"

x-backend-common: &backend-common
  image: ghcr.io/imaustinlittle/recall/backend:${IMAGE_TAG:-main}
  restart: unless-stopped
  volumes:
    - media_files:/data/media
  networks:
    - internal
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  environment:
    DATABASE_URL: ${DATABASE_URL}
    DATABASE_SYNC_URL: ${DATABASE_SYNC_URL}
    SECRET_KEY: ${SECRET_KEY}
    CORS_ORIGINS: https://recall.austlie.com
    ENVIRONMENT: production
    # ── Authentication ────────────────────────────────────────────────────
    # AUTH_MODE=local  → built-in email/password (default)
    # AUTH_MODE=proxy  → trust forward-auth headers from Authentik/Traefik.
    #   Only safe because this stack exposes ONLY the frontend via Traefik and
    #   the api is internal-only. Ensure the Authentik forwardAuth middleware
    #   lists these headers in authResponseHeaders so a client can't spoof them.
    AUTH_MODE: ${AUTH_MODE:-local}
    PROXY_AUTH_EMAIL_HEADER: ${PROXY_AUTH_EMAIL_HEADER:-X-Authentik-Email}
    PROXY_AUTH_NAME_HEADER: ${PROXY_AUTH_NAME_HEADER:-X-Authentik-Name}
    PROXY_AUTH_GROUPS_HEADER: ${PROXY_AUTH_GROUPS_HEADER:-X-Authentik-Groups}
    # Blank → every proxy-authenticated user is an app admin.
    PROXY_AUTH_ADMIN_GROUP: ${PROXY_AUTH_ADMIN_GROUP:-}
    PROXY_AUTH_LOGOUT_URL: ${PROXY_AUTH_LOGOUT_URL:-/outpost.goauthentik.io/sign_out}
    # ── Summarization (Ollama) ────────────────────────────────────────────
    # Defaults to the bundled ollama service below. Point at an existing
    # Ollama instance instead by setting OLLAMA_BASE_URL in your env vars.
    OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    # ── Voice profiles (also settable from the admin UI) ──────────────────
    VOICE_EMBED_MODEL: ${VOICE_EMBED_MODEL:-pyannote/embedding}
    VOICE_MATCH_THRESHOLD: ${VOICE_MATCH_THRESHOLD:-0.75}
    # ── Retention (also settable from the admin UI) ───────────────────────
    RETENTION_MODE: ${RETENTION_MODE:-off}
    RETENTION_DAYS: ${RETENTION_DAYS:-0}

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    # pgvector image = stock Postgres 16 + the `vector` extension (transcript
    # chat RAG + voice-profile matching). Compatible with the prior pg16 volume.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache / Queue ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    <<: *backend-common
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Background workers (one per GPU) ──────────────────────────────────────
  worker-0:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=1
        --queues=transcription,default
        --hostname=worker-0@%h
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  worker-1:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=1
        --queues=transcription,default
        --hostname=worker-1@%h
    environment:
      CUDA_VISIBLE_DEVICES: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # ── Celery beat (periodic tasks: retention cleanup) ────────────────────────
  beat:
    <<: *backend-common
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --schedule=/tmp/celerybeat-schedule

  # ── Ollama (local LLM for meeting summaries) — OPTIONAL ───────────────────
  # Gated behind the "ollama" compose profile. To run this bundled instance,
  # set COMPOSE_PROFILES=ollama in your env, then pull the model once:
  #   docker exec recall_ollama ollama pull llama3.1:8b
  # To use an Ollama you already run elsewhere, leave the profile off and set
  # OLLAMA_BASE_URL to its address instead.
  # GPU is optional — drop the deploy.resources block to run on CPU.
  ollama:
    image: ollama/ollama:latest
    container_name: recall_ollama
    restart: unless-stopped
    profiles: ["ollama"]
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Frontend ───────────────────────────────────────────────────────────────
  # All traffic enters here. Next.js rewrites /api/*, /media/*, /ws/* to the
  # api container internally — Traefik only needs to know about the frontend.
  frontend:
    image: ghcr.io/imaustinlittle/recall/frontend:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - internal
      - traefik_proxy
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # ── HTTPS router ──────────────────────────────────────────────────────
      - "traefik.http.routers.recall.rule=Host(`recall.austlie.com`)"
      - "traefik.http.routers.recall.entrypoints=https"
      - "traefik.http.routers.recall.tls=true"
      - "traefik.http.routers.recall.tls.certresolver=cloudflare"
      - "traefik.http.services.recall.loadbalancer.server.port=3000"


  # ── Celery monitor (optional, run with --profile monitor) ─────────────────
  flower:
    <<: *backend-common
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"   # bind to 0.0.0.0 — firewall this port externally
    profiles: ["monitor"]

  # ── MinIO (optional S3-compatible storage, run with --profile minio) ───────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - internal
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles: ["minio"]

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
  media_files:
  minio_data:
  ollama_data:
